name: Fusion Pipeline Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backup script
        run: python scripts/backup_pipelines.py

      - name: Run cleanup script
        run: python scripts/cleanup_old_backups.py

      - name: Commit and push backups
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add fusion_backups
          git commit -m "Automated Fusion pipeline backup $(date)" || echo "No changes to commit"
          git push
